services:
  db-create:
    image: postgres:17
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PGPASSWORD: securepassword123
    command: >-
      sh -c "psql -h host.docker.internal -p 15432 -U postgres -tc
      \"SELECT 1 FROM pg_database WHERE datname='flexibility'\" | grep -q 1
      || createdb -h host.docker.internal -p 15432 -U postgres flexibility"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      db-create:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:securepassword123@host.docker.internal:15432/flexibility
    command: uv run alembic upgrade head
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8017:8017"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:securepassword123@host.docker.internal:15432/flexibility
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./policies:/app/policies
    command: uv run uvicorn celine.flexibility.main:create_app --factory --host 0.0.0.0 --port 8017 --reload
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8017/health'').read()"',
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak.celine.localhost:host-gateway"
