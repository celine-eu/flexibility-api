services:
  db-create:
    image: postgres:17
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PGPASSWORD: securepassword123
    command: >-
      sh -c "psql -h host.docker.internal -p 15432 -U postgres -tc
      \"SELECT 1 FROM pg_database WHERE datname='flexibility'\" | grep -q 1
      || createdb -h host.docker.internal -p 15432 -U postgres flexibility"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      db-create:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: alembic upgrade head

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8017:8017"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8017/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak.celine.localhost:host-gateway"
